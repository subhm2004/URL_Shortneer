<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 396" width="900" height="396" role="img" aria-label="Trunc — a POST to /api/shorten passing through the validation chain, the short-code strategy, the repository, and the event bus, returning url_code Yw3dcSQK">
  <title>Trunc — watch the architecture run</title>

  <!--
    Animated with CSS inside the SVG. GitHub serves this through an <img>, where
    scripts never run but CSS animations do — so the whole timeline has to live
    in keyframes.

    Everything shares one 10s duration and encodes its own timing as percentages,
    which keeps the stages in lockstep. The wrapper group fades out at the end of
    the cycle; children reset to opacity 0 at 0%, so the loop doesn't flash.

    No external fonts: a webfont would be a network request the sandbox blocks,
    and the text would silently fall back anyway.
  -->
  <style>
    .mono {
      font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .card    { fill: #0d0d0d; stroke: #262626; }
    .rule    { stroke: #1f1f1f; stroke-width: 1; }
    .dot     { fill: #2e2e2e; }

    .brand   { fill: #f0f0f0; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; }
    .chrome  { fill: #5a5a5a; font-size: 11px; letter-spacing: 0.06em; }

    .prompt  { fill: #37f712; font-size: 15px; }
    .cmd     { fill: #f0f0f0; font-size: 15px; }
    .latency { fill: #6a6a6a; font-size: 11px; letter-spacing: 0.04em; }

    .tick    { fill: #37f712; font-size: 13px; }
    .call    { fill: #e8e8e8; font-size: 13.5px; }
    .layer   { fill: #37f712; font-size: 9.5px; letter-spacing: 0.14em; opacity: 0.62; }
    .async   { fill: #6a6a6a; font-size: 9px; letter-spacing: 0.1em; }
    .pill    { fill: none; stroke: #333; stroke-width: 1; stroke-dasharray: 2 2; }

    .arrow   { fill: #37f712; font-size: 13.5px; }
    .outkey  { fill: #6a6a6a; font-size: 13.5px; }
    .outval  { fill: #37f712; font-size: 13.5px; }

    .caret   { fill: #37f712; }

    /* ---- the loop ------------------------------------------------------- */

    /* Children sit at opacity 0 at 0%, so this reset is invisible. */
    #scene { animation: cycle 10s infinite; }
    @keyframes cycle {
      0%, 92%  { opacity: 1; }
      97%, 100% { opacity: 0; }
    }

    /* Typing: a clip rect widens in steps, so characters appear one at a time. */
    #type-clip rect { animation: type 10s steps(17) infinite; }
    @keyframes type {
      0%, 4%    { width: 0; }
      19%, 100% { width: 153px; }
    }

    #caret {
      animation: caret-move 10s steps(17) infinite, caret-blink 1.1s steps(1) infinite;
    }
    @keyframes caret-move {
      0%, 4%    { transform: translateX(0); }
      19%, 100% { transform: translateX(153px); }
    }
    @keyframes caret-blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* Each stage fades in on its own beat and then simply stays. */
    .stage { opacity: 0; }
    #s1 { animation: in1 10s infinite; }
    #s2 { animation: in2 10s infinite; }
    #s3 { animation: in3 10s infinite; }
    #s4 { animation: in4 10s infinite; }
    #out, #latency { animation: in5 10s infinite; }

    @keyframes in1 { 0%, 22% { opacity: 0; } 26%, 100% { opacity: 1; } }
    @keyframes in2 { 0%, 30% { opacity: 0; } 34%, 100% { opacity: 1; } }
    @keyframes in3 { 0%, 38% { opacity: 0; } 42%, 100% { opacity: 1; } }
    @keyframes in4 { 0%, 46% { opacity: 0; } 50%, 100% { opacity: 1; } }
    @keyframes in5 { 0%, 54% { opacity: 0; } 58%, 100% { opacity: 1; } }

    /* A viewer who asked for less motion gets the finished frame, not a loop. */
    @media (prefers-reduced-motion: reduce) {
      #scene, #caret, #type-clip rect,
      #s1, #s2, #s3, #s4, #out, #latency { animation: none; }
      .stage, #out, #latency { opacity: 1; }
      #type-clip rect { width: 153px; }
      #caret { opacity: 0; }
    }
  </style>

  <clipPath id="type-clip">
    <rect x="52" y="72" width="0" height="22" />
  </clipPath>

  <rect class="card" x="0.5" y="0.5" width="899" height="395" rx="14" />

  <g id="scene">
    <!-- window chrome -->
    <circle class="dot" cx="28" cy="26" r="5" />
    <circle class="dot" cx="46" cy="26" r="5" />
    <circle class="dot" cx="64" cy="26" r="5" />
    <text class="mono brand" x="88" y="31">TRUNC</text>
    <text class="mono chrome" x="160" y="31">cut it short</text>
    <text class="mono chrome" x="872" y="31" text-anchor="end">postgres · express · react · mcp</text>
    <line class="rule" x1="0" y1="52" x2="900" y2="52" />

    <!-- command line -->
    <text class="mono prompt" x="32" y="88">$</text>
    <g clip-path="url(#type-clip)">
      <text class="mono cmd" x="52" y="88">POST /api/shorten</text>
    </g>
    <rect id="caret" class="caret" x="53" y="74" width="8" height="17" />

    <text id="latency" class="mono latency" x="872" y="88" text-anchor="end">42ms round-trip</text>

    <!-- the four stages -->
    <g id="s1" class="stage">
      <text class="mono tick" x="34" y="140">✓</text>
      <text class="mono call" x="58" y="140">UrlValidator.validate()</text>
      <text class="mono layer" x="872" y="140" text-anchor="end">CHAIN OF RESPONSIBILITY</text>
    </g>

    <g id="s2" class="stage">
      <text class="mono tick" x="34" y="176">✓</text>
      <text class="mono call" x="58" y="176">ShortCodeStrategy.generate()</text>
      <text class="mono layer" x="872" y="176" text-anchor="end">STRATEGY + FACTORY</text>
    </g>

    <g id="s3" class="stage">
      <text class="mono tick" x="34" y="212">✓</text>
      <text class="mono call" x="58" y="212">UrlRepository.create()</text>
      <text class="mono layer" x="872" y="212" text-anchor="end">REPOSITORY + DECORATOR</text>
    </g>

    <g id="s4" class="stage">
      <text class="mono tick" x="34" y="248">✓</text>
      <text class="mono call" x="58" y="248">EventBus.publish(link.created)</text>
      <rect class="pill" x="618" y="235" width="52" height="18" rx="9" />
      <text class="mono async" x="644" y="247" text-anchor="middle">ASYNC</text>
      <text class="mono layer" x="872" y="248" text-anchor="end">OBSERVER</text>
    </g>

    <!-- result -->
    <g id="out">
      <line class="rule" x1="32" y1="284" x2="868" y2="284" />
      <text class="mono arrow" x="34" y="320">→</text>
      <text class="mono outkey" x="58" y="320">url_code = </text>
      <text class="mono outval" x="148" y="320">"Yw3dcSQK"</text>
      <text class="mono chrome" x="872" y="320" text-anchor="end">12 design patterns · 0 of them decorative</text>
    </g>

    <line class="rule" x1="0" y1="348" x2="900" y2="348" />
    <text class="mono chrome" x="32" y="374">the redirect answers before the click is ever written</text>
    <text class="mono chrome" x="872" y="374" text-anchor="end">50 concurrent clicks → 51 counted</text>
  </g>
</svg>
