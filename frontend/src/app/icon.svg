<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Favicon. Next picks this up from app/icon.svg automatically.

    Colours are hard-coded rather than inherited: a favicon renders outside the
    page, where none of our CSS variables exist. It also gets its own dark
    background, because browser tab strips are light as often as they're dark and
    a bare glyph would vanish into one of them.
  -->
  <rect width="32" height="32" rx="8" fill="#0d0d0d"/>
  <g fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 21.5H11a5 5 0 0 1 0-10h3.5" stroke="#fafafa"/>
    <path d="M11.5 16.5h3.5" stroke="#fafafa"/>
    <path d="M17.5 10.5H21a5 5 0 0 1 0 10h-3.5" stroke="#37f712"/>
    <path d="M17 15.5h3.5" stroke="#37f712"/>
  </g>
</svg>
