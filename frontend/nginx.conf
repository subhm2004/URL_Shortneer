server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # API: proxy to backend
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP HTTP transport + health check (SSE-friendly settings)
    location = /mcp {
        proxy_pass http://mcp:3001/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location = /health {
        proxy_pass http://mcp:3001/health;
        proxy_set_header Host $host;
    }

    # Short-link redirects: 6-16 char nanoid codes go to the backend.
    # The frontend's SPA routes are all multi-segment (e.g. /dashboard, /mcp-guide)
    # so this regex will not match them.
    location ~ "^/[A-Za-z0-9_-]{6,16}$" {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: static files first, then SPA fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
