services:
  # Local Postgres — only started with `--profile local-db` (or `make up-local`).
  # By default the stack talks to whatever DATABASE_URL points at (e.g. Neon),
  # so no database container runs at all.
  postgres:
    image: postgres:17-alpine
    container_name: trunc-postgres
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: trunc
      POSTGRES_PASSWORD: trunc
      POSTGRES_DB: trunc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trunc -d trunc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trunc-net

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: trunc-backend
    restart: unless-stopped
    environment:
      # Falls back to the local-db container when DATABASE_URL isn't set.
      DATABASE_URL: ${DATABASE_URL:-postgresql://trunc:trunc@postgres:5432/trunc}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      BASE_URL: ${PUBLIC_BASE_URL}
      ALLOWED_ORIGINS: ${PUBLIC_BASE_URL}
      SHORT_CODE_STRATEGY: ${SHORT_CODE_STRATEGY:-nanoid}
      NODE_ENV: production
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:5000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trunc-net

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: trunc-mcp
    restart: unless-stopped
    environment:
      SHORTENER_API_BASE: http://backend:5000
      PORT: 3001
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - trunc-net

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_HOSTED_MCP_URL: ${PUBLIC_BASE_URL}/mcp
    container_name: trunc-frontend
    restart: unless-stopped
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - trunc-net

volumes:
  postgres_data:

networks:
  trunc-net:
    driver: bridge
