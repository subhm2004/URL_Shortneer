services:
  # Local Postgres — only started with `--profile local-db` (or `make up-local`).
  # By default the stack talks to whatever DATABASE_URL points at (e.g. Neon),
  # so no database container runs at all.
  postgres:
    image: postgres:17-alpine
    container_name: trunc-postgres
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: trunc
      POSTGRES_PASSWORD: trunc
      POSTGRES_DB: trunc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trunc -d trunc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trunc-net

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: trunc-backend
    restart: unless-stopped
    environment:
      # Falls back to the local-db container when DATABASE_URL isn't set.
      DATABASE_URL: ${DATABASE_URL:-postgresql://trunc:trunc@postgres:5432/trunc}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      BASE_URL: ${PUBLIC_BASE_URL}
      ALLOWED_ORIGINS: ${PUBLIC_BASE_URL}
      SHORT_CODE_STRATEGY: ${SHORT_CODE_STRATEGY:-nanoid}
      NODE_ENV: production
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:5000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trunc-net

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: trunc-mcp
    restart: unless-stopped
    environment:
      SHORTENER_API_BASE: http://backend:5000
      PORT: 3001
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - trunc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Build args, not environment: Next inlines NEXT_PUBLIC_* into the client
      # bundle when it compiles. Passing them at runtime would have no effect.
      #
      # The browser — not this container — is what calls the API, so the URL has
      # to be one the browser can reach. `http://backend:5000` only resolves
      # inside the compose network, which is why this is the public origin.
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL}
        NEXT_PUBLIC_MCP_URL: ${PUBLIC_BASE_URL}/mcp
    container_name: trunc-frontend
    restart: unless-stopped
    # Next serves on 3000 (a Node process), where the old Vite build was static
    # files behind nginx on 80.
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
      mcp:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - trunc-net

volumes:
  postgres_data:

networks:
  trunc-net:
    driver: bridge
